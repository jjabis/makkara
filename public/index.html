<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sausage Tracker — Matchmaking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Login screen ─────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">
      <!-- Large sausage SVG injected by JS -->
    </div>
    <h1>Sausage Tracker</h1>
    <p class="login-sub">Select your profile to join the server.</p>
    <select id="username-select">
      <option value="">— Select thy name —</option>
    </select>
    <input id="password-input" type="password" placeholder="Shared password" autocomplete="current-password">
    <button id="login-btn">Connect to server</button>
    <p id="login-error" class="error-msg"></p>
  </div>
</div>

<!-- ── Main app ──────────────────────────────────────────────────────── -->
<div id="app" class="hidden">
  <header>
    <span id="header-user"></span>
    <button id="logout-btn" class="ghost-btn">Disconnect</button>
  </header>

  <!-- Progress bar -->
  <section class="progress-section">
    <div class="progress-label">
      <span id="progress-count">0</span><span class="progress-sep"> / </span><span id="progress-goal">100</span>
      <span class="progress-unit"> kills</span>
    </div>
    <div class="sausage-bar-wrap">
      <!-- SVG sausage progress bar injected by JS -->
    </div>
  </section>

  <!-- Countdown + pace -->
  <section class="pace-section">
    <div class="pace-row">
      <div class="pace-item">
        <span class="pace-label">Sunday 10:00</span>
        <span id="countdown" class="pace-value">—</span>
      </div>
      <div class="pace-divider"></div>
      <div class="pace-item">
        <span class="pace-label">Needed pace</span>
        <span id="pace-value" class="pace-value">—</span>
      </div>
    </div>
  </section>

  <!-- Leaderboard -->
  <section class="leaderboard-section">
    <h2>Scoreboard</h2>
    <div id="leaderboard"></div>
  </section>

  <!-- Action buttons -->
  <div class="action-buttons">
    <button id="log-self-btn" class="btn-primary">I ate a sausage</button>
    <button id="log-mate-btn" class="btn-secondary">My mate ate a sausage</button>
  </div>
</div>

<!-- ── Log for a mate modal ──────────────────────────────────────────── -->
<div id="mate-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3>Log kill for teammate</h3>
    <p class="modal-sub">Select teammate who ate a sausage.</p>
    <div id="mate-list"></div>
    <button class="modal-close ghost-btn" id="modal-close-btn">Abort</button>
  </div>
</div>

<!-- ── Eat animation overlay ─────────────────────────────────────────── -->
<div id="eat-overlay" class="eat-overlay hidden">
  <div class="eat-inner">
    <div id="eat-sausage-wrap"></div>
    <p id="eat-msg" class="eat-msg"></p>
  </div>
</div>

<!-- ── Goal celebration overlay ─────────────────────────────────────── -->
<div id="celebrate-overlay" class="celebrate-overlay hidden">
  <canvas id="confetti-canvas"></canvas>
  <div class="celebrate-inner">
    <div id="celebrate-sausage"></div>
    <h2 class="celebrate-title">100 sausages eaten</h2>
    <p class="celebrate-sub">GG — match over. Well played.</p>
    <button id="celebrate-dismiss" class="btn-primary">GG EZ</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
